<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Лабораторна робота №5</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 50px;
        background-color: #222;
        color: white;
      }

      #bulb {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin: 20px auto;
        background-color: #555;
        transition: all 0.3s ease;
      }

      #bulb.on.regular {
        background-color: #ffeb3b;
        box-shadow: 0 0 20px #ffeb3b;
      }
      #bulb.on.energy {
        background-color: #e0f7fa;
        box-shadow: 0 0 15px #e0f7fa;
      }
      #bulb.on.led {
        background-color: #008ee6;
        box-shadow: 0 0 30px #008ee6;
      }

      .controls {
        background: #333;
        padding: 20px;
        border-radius: 10px;
        display: inline-block;
      }
      button,
      select {
        margin: 5px;
        padding: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>Управління лампочкою</h2>

    <div id="bulb" class="regular off"></div>

    <div class="controls">
      <select id="bulbType">
        <option value="regular">Звичайна лампочка</option>
        <option value="energy">Енергозберігаюча</option>
        <option value="led">Світлодіодна (LED)</option>
      </select>

      <button id="toggleBtn">Включити</button>

      <button id="brightnessBtn">Змінити яскравість (тільки LED)</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
