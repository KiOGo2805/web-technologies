<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Лабораторна робота №5</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #2c3e50;
        color: white;
        margin-top: 50px;
      }

      .traffic-light {
        background-color: #333;
        padding: 20px;
        border-radius: 20px;
        display: inline-block;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .light {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin: 10px auto;
        background-color: #111;
        opacity: 0.3;
        transition: opacity 0.3s;
      }

      #red-light {
        background-color: #ff3b3b;
        box-shadow: 0 0 20px #ff3b3b;
      }
      #yellow-light {
        background-color: #ffeb3b;
        box-shadow: 0 0 20px #ffeb3b;
      }
      #green-light {
        background-color: #00e676;
        box-shadow: 0 0 20px #00e676;
      }

      .controls {
        margin-top: 30px;
        text-align: center;
      }
      button {
        padding: 10px 15px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background-color: #3498db;
        color: white;
        font-weight: bold;
      }
      button:hover {
        background-color: #2980b9;
      }

      #state-text {
        font-size: 24px;
        font-weight: bold;
        margin-top: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div class="traffic-light">
      <div id="red-light" class="light"></div>
      <div id="yellow-light" class="light"></div>
      <div id="green-light" class="light"></div>
    </div>

    <div id="state-text">ЧЕРВОНИЙ</div>

    <div class="controls">
      <button id="manualBtn">Наступний стан (Ручний режим)</button>
      <button id="timeBtn">Змінити тривалість (Prompt)</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
