<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Pair Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="setup-screen" class="screen">
      <h2>Game Settings</h2>
      <div class="form-group">
        <label>Players:</label>
        <select id="player-count">
          <option value="1">1 Player</option>
          <option value="2">2 Players</option>
        </select>
      </div>
      <div class="form-group">
        <label>Player 1 Name:</label>
        <input type="text" id="p1-name" value="Player 1" />
      </div>
      <div class="form-group hidden" id="p2-group">
        <label>Player 2 Name:</label>
        <input type="text" id="p2-name" value="Player 2" />
      </div>
      <div class="form-group">
        <label>Difficulty:</label>
        <select id="difficulty">
          <option value="easy">Easy - 8 pairs, 3 min</option>
          <option value="normal">Normal - 6 pairs, 2 min</option>
          <option value="hard">Hard - 4 pairs, 1 min</option>
        </select>
      </div>
      <div class="form-group">
        <label>Rounds:</label>
        <input type="number" id="rounds-count" value="1" min="1" />
      </div>
      <div class="button-row">
        <button id="reset-btn" type="button">Reset Settings</button>
        <button id="start-btn" type="button">Start Game</button>
      </div>
    </div>

    <div id="game-screen" class="screen hidden">
      <div class="header">
        <div id="status-display"></div>
        <div id="timer-display">00:00</div>
      </div>
      <div id="game-board" class="game-board"></div>
    </div>

    <div id="result-screen" class="screen hidden">
      <h2>Game Over</h2>
      <div id="stats-display"></div>
      <button id="restart-btn">New Game</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
